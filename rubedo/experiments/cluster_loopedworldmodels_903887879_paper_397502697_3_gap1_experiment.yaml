hypothesis: The spectral constraints used in looped world models to ensure contractive
  latent dynamics (eigenvalues in (0,1)) have not been applied to transformer-based
  looped architectures. Applying similar spectral normalization to the weight matrices
  in looped transformers could improve training stability and prevent gradient explosion
  during deep unrolling, especially in long-horizon reasoning tasks.
rationale: Bridging this gap could unify stability mechanisms across temporal and
  layer-wise looped systems, enabling more robust scaling of reasoning depth in transformers
  without heuristic tuning.
baseline: 'Reproduce the most direct baseline from: loopedworldmodels_903887879, powerofloopedtransformers_159603065.'
intervention: Implement spectral normalization on the recurrent weight matrices in
  looped transformer blocks, constraining eigenvalues to (0,1), and evaluate on long-context
  reasoning benchmarks (e.g., PG-19, SCROLLS) measuring training stability and perplexity
  over increased loop depth.
